<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Temple Pilgrimage Route</title>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

  /* NAVBAR */
  #navbar {
    position: sticky; top: 0; z-index: 1000;
    background: linear-gradient(135deg, #8B4513 0%, #D2691E 50%, #FF8C00 100%);
    color: white; padding: 10px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: flex; align-items: center; gap: 10px; flex-wrap: nowrap;
  }
  #navbar h1 { font-size: 1rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  #navbar h1 span { font-size: 1.3rem; }
  .state-tabs {
    display: flex; gap: 6px; overflow-x: auto; flex-grow: 1;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .state-tabs::-webkit-scrollbar { display: none; }
  .state-tab {
    padding: 7px 14px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.15); color: white; cursor: pointer;
    font-size: 0.85rem; font-weight: 600; white-space: nowrap;
    transition: all 0.2s; min-height: 36px; flex-shrink: 0;
  }
  .state-tab:hover { background: rgba(255,255,255,0.3); }
  .state-tab.active {
    background: white; color: #8B4513; border-color: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  /* MAIN LAYOUT */
  #main { display: flex; flex-direction: column; height: calc(100vh - 56px); }

  /* MAP */
  #map-wrap {
    position: relative; flex-shrink: 0;
    height: 45vh; min-height: 250px;
  }
  #map { width: 100%; height: 100%; }

  /* SUMMARY BAR */
  #summary-bar {
    background: #fff; border-top: 3px solid #FF8C00; border-bottom: 1px solid #e0e0e0;
    padding: 8px 14px; font-size: 0.82rem; color: #555;
    white-space: nowrap; overflow-x: auto;
  }
  #summary-bar strong { color: #333; }

  /* TABLE SECTION */
  #table-section {
    flex: 1; overflow: hidden; display: flex; flex-direction: column;
    background: white;
  }

  /* DAY FILTER PILLS */
  #day-filter {
    padding: 8px 12px; border-bottom: 1px solid #e8e8e8;
    display: flex; gap: 6px; overflow-x: auto; flex-shrink: 0;
    scrollbar-width: thin; background: #fafafa;
  }
  #day-filter::-webkit-scrollbar { height: 3px; }
  .day-pill {
    padding: 5px 12px; border-radius: 14px; border: none; cursor: pointer;
    font-size: 0.78rem; font-weight: 600; white-space: nowrap;
    transition: all 0.15s; min-height: 30px; flex-shrink: 0;
    opacity: 0.7;
  }
  .day-pill:hover { opacity: 1; transform: scale(1.05); }
  .day-pill.active { opacity: 1; box-shadow: 0 2px 6px rgba(0,0,0,0.25); }

  /* ITINERARY TABLE */
  #table-wrap {
    flex: 1; overflow-y: auto; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  table { width: 100%; border-collapse: collapse; min-width: 520px; }
  thead th {
    position: sticky; top: 0; background: #2c2c2c; color: white;
    padding: 8px 10px; font-size: 0.75rem; text-align: left;
    white-space: nowrap; z-index: 2;
  }
  .day-header {
    background: #f0f0f0; font-weight: 700; font-size: 0.8rem;
    text-align: left;
  }
  .day-header td {
    padding: 7px 12px; border-left: 4px solid #ccc;
    white-space: nowrap;
  }
  .temple-row {
    border-bottom: 1px solid #e8e8e8; cursor: pointer;
    transition: background 0.15s; min-height: 60px;
  }
  .temple-row:hover { filter: brightness(0.94); }
  .temple-row.highlighted {
    outline: 2px solid #FFD700; outline-offset: -2px;
    background: #FFFDE7 !important;
  }
  .temple-row td { padding: 8px 10px; vertical-align: middle; font-size: 0.82rem; }
  .stop-num { font-weight: 700; color: #888; font-size: 0.75rem; text-align: center; }
  .type-icon { text-align: center; font-size: 1.1rem; }
  .temple-name { font-weight: 600; color: #1a1a1a; line-height: 1.3; }
  .temple-district { color: #888; font-size: 0.72rem; margin-top: 2px; }
  .km-cell, .time-cell { text-align: center; white-space: nowrap; color: #555; }
  .window-cell { white-space: nowrap; font-size: 0.78rem; color: #444; text-align: center; }
  .gps-btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 6px 10px; background: #4285F4; color: white;
    border-radius: 6px; text-decoration: none; font-size: 0.75rem;
    font-weight: 600; white-space: nowrap; min-height: 36px;
    transition: background 0.15s; border: none; cursor: pointer;
  }
  .gps-btn:hover { background: #1a73e8; }
  .shiva-row { background: #FFF3E0; }
  .vishnu-row { background: #E3F2FD; }

  /* POPUP STYLES */
  .popup-content { min-width: 200px; }
  .popup-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
  .popup-sub { font-size: 0.78rem; color: #666; margin-bottom: 8px; }
  .popup-time { font-size: 0.8rem; margin-bottom: 8px; color: #444; }
  .popup-btns { display: flex; flex-direction: column; gap: 6px; }
  .popup-btn {
    display: block; text-align: center; padding: 8px 12px;
    border-radius: 8px; font-weight: 600; font-size: 0.82rem;
    text-decoration: none; transition: opacity 0.15s;
  }
  .popup-btn:hover { opacity: 0.85; }
  .popup-btn-maps { background: #4285F4; color: white; }
  .popup-btn-dir { background: #34A853; color: white; }

  /* DESKTOP LAYOUT */
  @media (min-width: 769px) {
    #main { flex-direction: column; }
    #map-wrap { height: 50vh; }
    #content-row {
      flex: 1; display: flex; overflow: hidden;
    }
    #map-wrap { flex: 0 0 55%; height: auto; }
    #table-section { flex: 0 0 45%; }
    #main { flex-direction: row; flex-wrap: wrap; }
    #map-wrap { order: 1; width: 55%; height: calc(100vh - 56px); }
    #right-panel { order: 2; width: 45%; height: calc(100vh - 56px); display: flex; flex-direction: column; overflow: hidden; }
    #summary-bar { order: 0; width: 100%; }
  }

  /* LOADING */
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(255,255,255,0.9); padding: 20px 30px; border-radius: 12px;
    font-weight: 600; font-size: 0.9rem; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    z-index: 999;
  }

  /* SCROLL TO TOP */
  #scroll-top {
    position: fixed; bottom: 20px; right: 20px; z-index: 500;
    background: #FF8C00; color: white; border: none; border-radius: 50%;
    width: 44px; height: 44px; font-size: 1.2rem; cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25); display: none;
    align-items: center; justify-content: center;
  }
</style>

const STATS = {"Tamil Nadu":{"days":10,"temples":56,"km":1511,"first":"Arunachaleswarar Temple","last":"Ramanathaswamy Temple (Devipattinam)","abbr":"TN"},"Karnataka":{"days":9,"temples":45,"km":1587,"first":"Virupaksha Temple (Hampi)","last":"Male Mahadeshwara Temple","abbr":"KA"},"Andhra Pradesh":{"days":6,"temples":25,"km":1178,"first":"Srikalahasteeswara Temple","last":"Srikurmam Kurmanathaswamy Temple","abbr":"AP"},"Telangana":{"days":4,"temples":14,"km":706,"first":"Vemulawada Rajanna Temple","last":"Alampur Navabrahma Temples","abbr":"TG"}};
const DAY_PALETTE = ["#4A90D9", "#E67E22", "#27AE60", "#8E44AD", "#E74C3C", "#16A085", "#F39C12", "#2980B9", "#D35400", "#1ABC9C", "#C0392B", "#2ECC71", "#9B59B6", "#F1C40F", "#3498DB"];

function dayColor(d) {
  return DAY_PALETTE[(d - 1) % DAY_PALETTE.length];
}

function fmtDrive(min) {
  if (min === 0) return '-';
  const h = Math.floor(min/60), m = min%60;
  return h > 0 ? `${h}h${m > 0 ? m+'m' : ''}` : `${m}m`;
}

// Map state
let map = null;
let markers = [];
let polylines = [];
let activeState = 'Tamil Nadu';
let selectedRow = null;
let selectedMarkerIdx = null;
let markerObjects = [];

function initMap() {
  map = L.map('map', {
    zoomControl: true,
    attributionControl: true,
    tap: true
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);
  document.getElementById('loading').style.display = 'none';
}

function clearMap() {
  markers.forEach(m => map.removeLayer(m));
  polylines.forEach(p => map.removeLayer(p));
  markers = [];
  polylines = [];
  markerObjects = [];
}

function makeMarkerIcon(stopNum, dayNum, type) {
  const col = dayColor(dayNum);
  const border = type === 'Shiva' ? '#E65100' : '#1565C0';
  const bg = type === 'Shiva' ? '#FF8C00' : '#1976D2';
  const emoji = type === 'Shiva' ? '🕉' : '🙏';
  return L.divIcon({
    className: '',
    html: `<div style="
      width:34px;height:34px;border-radius:50%;
      background:${bg};border:3px solid ${col};
      display:flex;align-items:center;justify-content:center;
      font-size:0.7rem;font-weight:700;color:white;
      box-shadow:0 2px 6px rgba(0,0,0,0.35);
      position:relative;cursor:pointer;
    ">
      <span style="font-size:0.95rem;line-height:1">${emoji}</span>
      <span style="
        position:absolute;top:-6px;right:-6px;
        background:${col};color:white;
        width:16px;height:16px;border-radius:50%;
        font-size:0.6rem;font-weight:800;
        display:flex;align-items:center;justify-content:center;
        border:1px solid white;
      ">${stopNum}</span>
    </div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 17],
    popupAnchor: [0, -20]
  });
}

function buildPopup(temple, idx) {
  const stops = SCHEDULES[activeState];
  const prevTemple = idx > 0 ? stops[idx-1] : null;
  const dirUrl = prevTemple
    ? `https://www.google.com/maps/dir/${prevTemple.lat},${prevTemple.lon}/${temple.lat},${temple.lon}`
    : `https://www.google.com/maps?q=${temple.lat},${temple.lon}`;
  const mapsUrl = `https://www.google.com/maps?q=${temple.lat},${temple.lon}`;
  const archH = temple.archana_min >= 150 ? '2.5h' : '1.5h';
  return `<div class="popup-content">
    <div class="popup-title">${temple.name}</div>
    <div class="popup-sub">📍 ${temple.district} · ${temple.state}</div>
    <div class="popup-sub">Day ${temple.day} · Stop #${temple.stop} · ${temple.type} temple</div>
    <div class="popup-time">⏰ ${temple.arrive} – ${temple.depart} (${archH} archana)</div>
    ${temple.km_from_prev > 0 ? `<div class="popup-time">🚗 ${temple.km_from_prev} km · ${fmtDrive(temple.travel_min)} drive</div>` : ''}
    ${temple.contact_person ? `<div class="popup-time">👤 <strong>${temple.contact_person}</strong> · <a href="tel:${temple.contact_phone.replace(/ /g,'')}" style="color:#1a73e8;text-decoration:none;">📞 ${temple.contact_phone}</a></div>` : ''}
    <div class="popup-btns">
      <a href="${mapsUrl}" target="_blank" class="popup-btn popup-btn-maps">📍 Open in Google Maps</a>
      <a href="${dirUrl}" target="_blank" class="popup-btn popup-btn-dir">🗺️ Get Directions</a>
    </div>
  </div>`;
}


let currentKartaSlug = null;
let currentKartaTemples = null;
const KARTAS_BY_STATE = {};

const _STATE_TO_CODE = {'Tamil Nadu':'tn','Karnataka':'ka','Andhra Pradesh':'ap','Telangana':'tg'};

async function loadKartasForState(state) {
  const code = _STATE_TO_CODE[state];
  const sel = document.getElementById('karta-select');
  sel.innerHTML = '<option value="">— All temples (no filter) —</option>';
  document.getElementById('karta-link').style.display = 'none';
  currentKartaSlug = null;
  currentKartaTemples = null;
  if (!code) return;
  try {
    if (!KARTAS_BY_STATE[code]) {
      const r = await fetch('/k/api/state/' + code);
      const j = await r.json();
      KARTAS_BY_STATE[code] = j.kartas || [];
    }
  } catch(e) { KARTAS_BY_STATE[code] = []; }
  const stateTempleNames = new Set((SCHEDULES[state] || []).map(t => t.name));
  KARTAS_BY_STATE[code].forEach(k => {
    const allNames = k.temples.map(t => t.name);
    const matching = allNames.filter(n => stateTempleNames.has(n));
    const opt = document.createElement('option');
    opt.value = k.slug;
    // Filter the dropdown's stored names to only those visible on map (so filter matches count)
    opt.dataset.temples = JSON.stringify(matching);
    opt.dataset.name = k.name;
    const label = matching.length === allNames.length
      ? (k.name + ' (' + matching.length + ' temples)')
      : (k.name + ' (' + matching.length + ' on map · ' + allNames.length + ' total)');
    opt.textContent = label;
    sel.appendChild(opt);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('karta-select');
  if (sel) {
    sel.addEventListener('change', (e) => {
      const o = e.target;
      const link = document.getElementById('karta-link');
      if (!o.value) {
        currentKartaSlug = null;
        currentKartaTemples = null;
        link.style.display = 'none';
      } else {
        const opt = o.options[o.selectedIndex];
        const names = JSON.parse(opt.dataset.temples || '[]');
        currentKartaSlug = o.value;
        currentKartaTemples = new Set(names);
        link.href = '/k/' + o.value;
        link.textContent = '📋 ' + opt.dataset.name + ' tracking →';
        link.style.display = 'inline-block';
      }
      if (typeof loadState === 'function') loadState(activeState);
    });
  }
});

function _filterStops(state) {
  let stops = SCHEDULES[state] || [];
  if (currentKartaTemples && currentKartaTemples.size > 0) {
    stops = stops.filter(t => currentKartaTemples.has(t.name));
  }
  return stops;
}

function loadState(state) {
  activeState = state;
  clearMap();
  selectedRow = null;
  selectedMarkerIdx = null;

  const stops = _filterStops(state);
  if (!stops || stops.length === 0) return;

  // Group by day for polylines
  const byDay = {};
  stops.forEach(s => {
    if (!byDay[s.day]) byDay[s.day] = [];
    byDay[s.day].push(s);
  });

  // Draw polylines
  Object.entries(byDay).forEach(([day, dayStops]) => {
    const col = dayColor(parseInt(day));
    const coords = dayStops.map(s => [s.lat, s.lon]);
    if (coords.length > 1) {
      const pl = L.polyline(coords, {
        color: col, weight: 3, opacity: 0.75,
        dashArray: '6,4'
      }).addTo(map);
      polylines.push(pl);
    }
  });

  // Draw markers
  stops.forEach((t, idx) => {
    const icon = makeMarkerIcon(t.stop, t.day, t.type);
    const marker = L.marker([t.lat, t.lon], {icon}).addTo(map);
    marker.bindPopup(buildPopup(t, idx), {maxWidth: 280, minWidth: 240});
    marker.on('click', () => {
      selectStop(idx);
    });
    markers.push(marker);
    markerObjects.push(marker);
  });

  // Fit map bounds
  const lats = stops.map(s => s.lat);
  const lons = stops.map(s => s.lon);
  const bounds = [[Math.min(...lats)-0.2, Math.min(...lons)-0.2],
                  [Math.max(...lats)+0.2, Math.max(...lons)+0.2]];
  map.fitBounds(bounds, {padding: [20, 20]});

  buildTable(state);
  buildDayFilter(state);
  updateSummary(state);
}

function selectStop(idx) {
  // Deselect previous
  if (selectedRow !== null) {
    const prevRow = document.querySelector(`#table-body tr[data-idx="${selectedRow}"]`);
    if (prevRow) prevRow.classList.remove('highlighted');
  }

  selectedMarkerIdx = idx;
  selectedRow = idx;

  // Highlight row
  const row = document.querySelector(`#table-body tr[data-idx="${idx}"]`);
  if (row) {
    row.classList.add('highlighted');
    row.scrollIntoView({behavior: 'smooth', block: 'center'});
  }
}

function flyToStop(idx) {
  const stops = SCHEDULES[activeState];
  const t = stops[idx];
  map.flyTo([t.lat, t.lon], 14, {duration: 0.8});
  // Open popup
  setTimeout(() => {
    if (markerObjects[idx]) {
      markerObjects[idx].openPopup();
    }
  }, 900);
  selectStop(idx);
}

function buildDayFilter(state) {
  const stops = _filterStops(state);
  const days = [...new Set(stops.map(s => s.day))].sort((a,b) => a-b);
  const container = document.getElementById('day-filter');
  container.innerHTML = '<span style="font-size:0.75rem;color:#888;white-space:nowrap;padding:5px 4px;flex-shrink:0;">Jump:</span>';
  days.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-pill';
    btn.textContent = `Day ${d}`;
    btn.style.background = dayColor(d);
    btn.style.color = 'white';
    btn.dataset.day = d;
    btn.onclick = () => jumpToDay(d);
    container.appendChild(btn);
  });
}

function jumpToDay(dayNum) {
  const row = document.querySelector(`#table-body tr.day-header[data-day="${dayNum}"]`);
  if (row) {
    row.scrollIntoView({behavior: 'smooth', block: 'start'});
  }
  // Highlight all pills
  document.querySelectorAll('.day-pill').forEach(p => {
    p.classList.toggle('active', parseInt(p.dataset.day) === dayNum);
  });
}

function buildTable(state) {
  const stops = _filterStops(state);
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  // Group by day
  const byDay = {};
  stops.forEach((s, idx) => {
    if (!byDay[s.day]) byDay[s.day] = [];
    byDay[s.day].push({...s, idx});
  });

  Object.entries(byDay).forEach(([dayNum, dayStops]) => {
    const d = parseInt(dayNum);
    const col = dayColor(d);
    const dayKm = dayStops.reduce((sum, s) => sum + s.km_from_prev, 0);

    // Day header row
    const hdr = document.createElement('tr');
    hdr.className = 'day-header';
    hdr.dataset.day = d;
    hdr.innerHTML = `<td colspan="7" style="border-left-color:${col}">
      <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${col};vertical-align:middle;margin-right:6px;"></span>
      Day ${d} &nbsp;·&nbsp; <strong>${dayStops.length} Temples</strong> &nbsp;·&nbsp; ${dayKm.toFixed(0)} km total
    </td>`;
    tbody.appendChild(hdr);

    dayStops.forEach(t => {
      const tr = document.createElement('tr');
      tr.className = `temple-row ${t.type === 'Shiva' ? 'shiva-row' : 'vishnu-row'}`;
      tr.dataset.idx = t.idx;
      tr.style.borderLeft = `3px solid ${col}`;

      const icon = t.type === 'Shiva' ? '🕉' : '🙏';
      const mapsUrl = `https://www.google.com/maps?q=${t.lat},${t.lon}`;
      const archH = t.archana_min >= 150 ? '2.5h' : '1.5h';

      tr.innerHTML = `
        <td class="stop-num">${t.stop}</td>
        <td class="type-icon">${icon}</td>
        <td>
          <div class="temple-name">${t.name}</div>
          <div class="temple-district">📍 ${t.district}</div>
          ${t.contact_person ? `<div class="temple-district" style="color:#555;margin-top:1px;">👤 ${t.contact_person} · <a href="tel:${t.contact_phone.replace(/ /g,'')}" style="color:#1a73e8;text-decoration:none;" onclick="event.stopPropagation()">📞 ${t.contact_phone}</a></div>` : ''}
        </td>
        <td class="km-cell">${t.km_from_prev > 0 ? t.km_from_prev + ' km' : '-'}</td>
        <td class="time-cell">${fmtDrive(t.travel_min)}</td>
        <td class="window-cell">${t.arrive}<br><small style="color:#888">→${t.depart}</small></td>
        <td>
          <a href="${mapsUrl}" target="_blank" class="gps-btn" onclick="event.stopPropagation()">📍</a>
        </td>
      `;

      tr.addEventListener('click', () => flyToStop(t.idx));
      tbody.appendChild(tr);
    });
  });
}

function updateSummary(state) {
  const s = STATS[state];
  const bar = document.getElementById('summary-bar');
  bar.innerHTML = `🗺️ <strong>${state}</strong> &nbsp;·&nbsp; ${s.temples} Temples &nbsp;·&nbsp; ${s.days} Days &nbsp;·&nbsp; ${s.km} km total &nbsp;·&nbsp; Start: <em>${s.first}</em> → End: <em>${s.last}</em>`;
}

// Scroll-to-top for table
document.getElementById('table-wrap').addEventListener('scroll', function() {
  document.getElementById('scroll-top').style.display = this.scrollTop > 200 ? 'flex' : 'none';
});

// URL routing: abbreviation <-> state name
const ABBR_TO_STATE = {};
const STATE_TO_ABBR = {};
Object.entries(STATS).forEach(([name, info]) => {
  const abbr = info.abbr.toLowerCase();
  ABBR_TO_STATE[abbr] = name;
  STATE_TO_ABBR[name] = abbr;
});

function switchState(state, pushUrl) {
  document.querySelectorAll('.state-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.state === state);
  });
  loadKartasForState(state);
  loadState(state);
  if (pushUrl !== false) {
    const abbr = STATE_TO_ABBR[state];
    const newPath = abbr ? '/' + abbr : '/';
    if (window.location.pathname !== newPath) {
      history.pushState({state: state}, '', newPath);
    }
  }
}

// State tab switching
document.querySelectorAll('.state-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    switchState(btn.dataset.state);
  });
});

// Handle browser back/forward
window.addEventListener('popstate', (e) => {
  if (e.state && e.state.state) {
    switchState(e.state.state, false);
  } else {
    // Fallback: check URL
    const path = window.location.pathname.replace(/^\//, '').toLowerCase();
    const state = ABBR_TO_STATE[path] || 'Tamil Nadu';
    switchState(state, false);
  }
});

// Init
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  const path = window.location.pathname.replace(/^\//, '').toLowerCase();
  const initialState = ABBR_TO_STATE[path] || 'Tamil Nadu';
  // Replace current history entry so back button works correctly
  history.replaceState({state: initialState}, '', window.location.pathname);
  switchState(initialState, false);
});
</script>
